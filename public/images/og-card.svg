<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative doodles -->
  <circle cx="1050" cy="100" r="60" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" stroke-dasharray="8 6" fill="none"/>
  <circle cx="150" cy="500" r="35" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
  <path d="M900 480 Q920 460, 940 480 Q960 500, 980 480 Q1000 460, 1020 480" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" fill="none"/>
  <circle cx="300" cy="150" r="4" fill="rgba(255,255,255,0.1)"/>
  <circle cx="950" cy="350" r="3" fill="rgba(255,255,255,0.08)"/>
  <circle cx="200" cy="400" r="5" fill="rgba(255,255,255,0.06)"/>
  <!-- Eye logo -->
  <g transform="translate(540, 180)">
    <path d="M-60 0C-60 0 -30 -36 0 -36C30 -36 60 0 60 0C60 0 30 36 0 36C-30 36 -60 0 -60 0Z"
          stroke="url(#purple)" stroke-width="3.5" stroke-linejoin="round" fill="none"/>
    <circle cx="0" cy="0" r="10" stroke="url(#purple)" stroke-width="3" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="url(#purple)"/>
  </g>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Uncensored</text>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)" font-weight="400">Speak freely. Think boldly.</text>
  <!-- Accent line -->
  <rect x="530" y="400" width="140" height="3" rx="2" fill="url(#purple)" opacity="0.6"/>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">uncensored.app</text>
</svg>
